name: Build and Deploy Marketplace

on:
  push:
    branches: [main, master]
    paths:
      - 'themes/**'
      - 'marketplace/**'
      - '.github/workflows/build-marketplace.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Marketplace

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install marketplace dependencies
        working-directory: marketplace
        run: npm ci

      - name: Generate theme data
        run: node scripts/build-marketplace.js

      - name: Build marketplace
        working-directory: marketplace
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: marketplace/dist

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
